name: Build Shinobi ZimaOS Image

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Publish channel"
        required: false
        default: "both"
        type: choice
        options:
          - "stable"
          - "experimental"
          - "both"
      force:
        description: "Build even if upstream Shinobi dev has not changed"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "0 3 * * 0"

concurrency:
  group: build-shinobi-zimaos-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/kaanaldemir/shinobi-zimaos
  SHINOBI_BRANCH: dev
  SHINOBI_REPO: Shinobi-Systems/Shinobi

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      upstream_sha: ${{ steps.upstream.outputs.sha }}
      upstream_short_sha: ${{ steps.upstream.outputs.short_sha }}
      build_stable: ${{ steps.decide.outputs.build_stable }}
      build_experimental: ${{ steps.decide.outputs.build_experimental }}

    steps:
      - name: Get upstream Shinobi commit
        id: upstream
        run: |
          set -euo pipefail
          sha="$(git ls-remote https://gitlab.com/${SHINOBI_REPO}.git refs/heads/${SHINOBI_BRANCH} | awk '{print $1}')"
          if [ -z "$sha" ]; then
            echo "Failed to resolve upstream commit" >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=${sha:0:12}" >> "$GITHUB_OUTPUT"
          echo "Upstream ${SHINOBI_BRANCH}: $sha"

      - name: Resolve requested channels
        id: channel
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ]; then
            channel="both"
          else
            channel="${{ github.event.inputs.channel || 'both' }}"
          fi
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Read current stable image source revision
        id: existing_stable
        continue-on-error: true
        run: |
          set -euo pipefail
          token="$(curl -fsSL "https://ghcr.io/token?scope=repository:kaanaldemir/shinobi-zimaos:pull" | jq -r '.token')"
          tag="latest"
          manifest="$(curl -fsSL \
            -H "Authorization: Bearer ${token}" \
            -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/kaanaldemir/shinobi-zimaos/manifests/${tag}")"
          if jq -e '.manifests' >/dev/null <<< "$manifest"; then
            digest="$(jq -r '.manifests[] | select((.platform.os == "linux") and (.platform.architecture == "amd64")) | .digest' <<< "$manifest" | head -n1)"
            manifest="$(curl -fsSL \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/kaanaldemir/shinobi-zimaos/manifests/${digest}")"
          fi
          config_digest="$(jq -r '.config.digest' <<< "$manifest")"
          config="$(curl -fsSL -H "Authorization: Bearer ${token}" "https://ghcr.io/v2/kaanaldemir/shinobi-zimaos/blobs/${config_digest}")"
          sha="$(jq -r '.config.Labels["org.opencontainers.image.revision"] // empty' <<< "$config")"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Current ${tag} image revision: ${sha:-none}"

      - name: Read current experimental image source revision
        id: existing_experimental
        continue-on-error: true
        run: |
          set -euo pipefail
          token="$(curl -fsSL "https://ghcr.io/token?scope=repository:kaanaldemir/shinobi-zimaos:pull" | jq -r '.token')"
          tag="experimental"
          manifest="$(curl -fsSL \
            -H "Authorization: Bearer ${token}" \
            -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/kaanaldemir/shinobi-zimaos/manifests/${tag}")"
          if jq -e '.manifests' >/dev/null <<< "$manifest"; then
            digest="$(jq -r '.manifests[] | select((.platform.os == "linux") and (.platform.architecture == "amd64")) | .digest' <<< "$manifest" | head -n1)"
            manifest="$(curl -fsSL \
              -H "Authorization: Bearer ${token}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/kaanaldemir/shinobi-zimaos/manifests/${digest}")"
          fi
          config_digest="$(jq -r '.config.digest' <<< "$manifest")"
          config="$(curl -fsSL -H "Authorization: Bearer ${token}" "https://ghcr.io/v2/kaanaldemir/shinobi-zimaos/blobs/${config_digest}")"
          sha="$(jq -r '.config.Labels["org.opencontainers.image.revision"] // empty' <<< "$config")"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Current ${tag} image revision: ${sha:-none}"

      - name: Decide which channels to build
        id: decide
        run: |
          set -euo pipefail
          force="${{ github.event.inputs.force || 'false' }}"
          channel="${{ steps.channel.outputs.channel }}"
          upstream="${{ steps.upstream.outputs.sha }}"
          existing_stable="${{ steps.existing_stable.outputs.sha }}"
          existing_experimental="${{ steps.existing_experimental.outputs.sha }}"
          build_stable=false
          build_experimental=false

          if [ "$channel" = "stable" ] || [ "$channel" = "both" ]; then
            if [ "$force" = "true" ] || [ -z "$existing_stable" ] || [ "$upstream" != "$existing_stable" ]; then
              build_stable=true
            fi
          fi

          if [ "$channel" = "experimental" ] || [ "$channel" = "both" ]; then
            if [ "$force" = "true" ] || [ -z "$existing_experimental" ] || [ "$upstream" != "$existing_experimental" ]; then
              build_experimental=true
            fi
          fi

          echo "build_stable=${build_stable}" >> "$GITHUB_OUTPUT"
          echo "build_experimental=${build_experimental}" >> "$GITHUB_OUTPUT"
          echo "Requested channel mode: ${channel}"
          echo "Build stable: ${build_stable}"
          echo "Build experimental: ${build_experimental}"

  build:
    needs: check
    if: |
      needs.check.outputs.build_stable == 'true' ||
      needs.check.outputs.build_experimental == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        channel:
          - stable
          - experimental

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preflight scripts
        run: |
          set -euo pipefail
          bash -n entrypoint.sh
          bash -n scripts/smoke-test.sh
          bash -n scripts/test-intel-runtime.sh
          grep -q -- '--entrypoint /bin/bash' .github/workflows/build-shinobi.yml

      - name: Set up Docker Buildx
        if: |
          (matrix.channel == 'stable' && needs.check.outputs.build_stable == 'true') ||
          (matrix.channel == 'experimental' && needs.check.outputs.build_experimental == 'true')
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: |
          (matrix.channel == 'stable' && needs.check.outputs.build_stable == 'true') ||
          (matrix.channel == 'experimental' && needs.check.outputs.build_experimental == 'true')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve matrix channel settings
        if: |
          (matrix.channel == 'stable' && needs.check.outputs.build_stable == 'true') ||
          (matrix.channel == 'experimental' && needs.check.outputs.build_experimental == 'true')
        id: channel
        run: |
          set -euo pipefail
          if [ "${{ matrix.channel }}" = "experimental" ]; then
            echo "patch_profile=experimental-event-audio" >> "$GITHUB_OUTPUT"
            {
              echo "publish_tags<<EOF"
              echo "${IMAGE_NAME}:experimental"
              echo "${IMAGE_NAME}:experimental-sha-${{ needs.check.outputs.upstream_short_sha }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "patch_profile=stable" >> "$GITHUB_OUTPUT"
            {
              echo "publish_tags<<EOF"
              echo "${IMAGE_NAME}:latest"
              echo "${IMAGE_NAME}:dev"
              echo "${IMAGE_NAME}:sha-${{ needs.check.outputs.upstream_short_sha }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build image for smoke test
        if: |
          (matrix.channel == 'stable' && needs.check.outputs.build_stable == 'true') ||
          (matrix.channel == 'experimental' && needs.check.outputs.build_experimental == 'true')
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: shinobi-zimaos:${{ matrix.channel }}-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SHINOBI_BRANCH=${{ env.SHINOBI_BRANCH }}
            SHINOBI_COMMIT=${{ needs.check.outputs.upstream_sha }}
            PATCH_PROFILE=${{ steps.channel.outputs.patch_profile }}

      - name: Run smoke test
        if: |
          (matrix.channel == 'stable' && needs.check.outputs.build_stable == 'true') ||
          (matrix.channel == 'experimental' && needs.check.outputs.build_experimental == 'true')
        run: docker run --rm --entrypoint /bin/bash shinobi-zimaos:${{ matrix.channel }}-test /scripts/smoke-test.sh

      - name: Push image
        if: |
          (matrix.channel == 'stable' && needs.check.outputs.build_stable == 'true') ||
          (matrix.channel == 'experimental' && needs.check.outputs.build_experimental == 'true')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.channel.outputs.publish_tags }}
          build-args: |
            SHINOBI_BRANCH=${{ env.SHINOBI_BRANCH }}
            SHINOBI_COMMIT=${{ needs.check.outputs.upstream_sha }}
            PATCH_PROFILE=${{ steps.channel.outputs.patch_profile }}
          labels: |
            org.opencontainers.image.source=https://github.com/kaanaldemir/shinobi-zimaos-image
            org.opencontainers.image.description=Fresh Shinobi image for ZimaOS Custom App installs
            org.opencontainers.image.revision=${{ needs.check.outputs.upstream_sha }}
            org.opencontainers.image.version=${{ env.SHINOBI_BRANCH }}-${{ needs.check.outputs.upstream_short_sha }}
